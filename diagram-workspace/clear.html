<!DOCTYPE html>
<html lang="en">
<head>
    <title>Clear Local Cache | Diagram Workspace</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style type="text/css">
        body {
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.12), transparent 26%),
                radial-gradient(circle at bottom right, rgba(212, 138, 26, 0.12), transparent 24%),
                linear-gradient(180deg, #15202b 0%, #0f1724 100%);
            color: #eef3fb;
        }

        .panel {
            width: min(560px, calc(100vw - 32px));
            padding: 28px 28px 24px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: linear-gradient(180deg, rgba(24, 36, 54, 0.78), rgba(12, 20, 32, 0.62));
            backdrop-filter: blur(22px) saturate(150%);
            -webkit-backdrop-filter: blur(22px) saturate(150%);
            box-shadow: 0 28px 70px rgba(3, 8, 18, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.12);
            text-align: center;
        }

        .brand {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 18px;
        }

        .brand img {
            width: 34px;
            height: 34px;
        }

        .brand strong {
            font-size: 22px;
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        #content {
            white-space: normal;
            font-size: 14px;
            line-height: 1.7;
            color: #d8e2ef;
        }

        button {
            margin: 8px 6px 0;
            padding: 10px 14px;
            border: 0;
            border-radius: 12px;
            background: linear-gradient(135deg, #e2a435, #d48a1a);
            color: #ffffff;
            font: 700 13px/1 "Segoe UI", sans-serif;
            cursor: pointer;
            box-shadow: 0 12px 24px rgba(212, 138, 26, 0.24);
        }

        button.secondary {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: none;
        }
    </style>
</head>
<body>
    <div class="panel">
        <div class="brand">
            <img src="images/brand-mark.svg" alt="">
            <strong>Diagram Workspace</strong>
        </div>
        <div id="content"></div>
        <script src="js/app.min.js"></script>
        <script src="js/clear.js"></script>
    </div>
</body>
</html>
