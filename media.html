<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zz资源库 | 影视追番表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&family=Noto+Sans+SC:wght@300;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas class="particle-canvas" id="particleCanvas"></canvas>
    <audio id="bgAudio" src="./知我.webm" preload="auto" loop autoplay></audio>
    <div class="ambient"></div>
    <header class="site-header">
      <div class="logo">
        <div class="logo-container">
          <img src="./touxiang.jpg" alt="Logo" class="logo-image">
          <div class="qrcode-popup">
            <img src="./qrcode.jpg" alt="QR Code" class="qrcode-image">
            <p class="qrcode-text">联系方式</p>
          </div>
        </div>
        <span class="logo-text">浅望</span>
      </div>
      <nav class="nav">
        <a href="./index.html#about">关于</a>
        <a href="./index.html#posts">文章</a>
        <a href="./index.html#projects">项目</a>
        <a href="./index.html#notes">随记</a>
        <a href="./media.html">追番</a>
        <a href="./index.html#contact">联系</a>
      </nav>
      <button class="theme-toggle" id="themeToggle">暗色</button>
    </header>

    <div class="controls-floating">
      <label>
        <span>特效</span>
        <select id="modeSelect">
          <option value="newyear" selected>马年</option>
          <option value="aura">流萤</option>
          <option value="star">星空</option>
          <option value="ripple">涟漪</option>
        </select>
      </label>
      <button class="control-btn" id="pauseToggle">暂停</button>
      <button class="control-btn" id="audioToggle">音乐播放</button>
    </div>

    <main>
      <section class="section media" id="media">
        <div class="section-title">
          <h2>影视追番表</h2>
        </div>
        <div class="media-links" id="mediaLinks"></div>
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="搜索影视资源..." class="search-input" oninput="if(this.value === '') searchMedia()" onkeypress="if(event.key === 'Enter') searchMedia()">
          <button onclick="searchMedia()" class="search-button">搜索</button>
        </div>
        <script>
        function searchMedia() {
          console.log('搜索按钮点击');
          const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
          console.log('搜索词:', searchTerm);
          
          const mediaTables = document.getElementById('mediaTables');
          
          if (!searchTerm) {
            // 搜索词为空，显示所有表格
            fetch('./影视资源表格.html')
              .then(response => response.text())
              .then(html => {
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                const tables = Array.from(doc.querySelectorAll('table')).filter(table => {
                  const text = table.textContent || '';
                  return text.includes('剧名') && (text.includes('夸克') || text.includes('百度'));
                });
                
                mediaTables.innerHTML = '';
                tables.forEach(table => {
                  const title = table.previousElementSibling && table.previousElementSibling.tagName === 'H2' ? table.previousElementSibling.textContent : '影视资源表';
                  const wrapper = document.createElement('div');
                  wrapper.className = 'media-table';
                  const titleElement = document.createElement('h3');
                  titleElement.textContent = title;
                  wrapper.appendChild(titleElement);
                  
                  const cloned = table.cloneNode(true);
                  cloned.querySelectorAll('a').forEach(link => {
                    link.setAttribute('target', '_blank');
                    link.setAttribute('rel', 'noopener');
                  });
                  wrapper.appendChild(cloned);
                  mediaTables.appendChild(wrapper);
                });
              })
              .catch(() => {
                mediaTables.innerHTML = '<div style="text-align: center; padding: 40px;">加载失败，请稍后重试</div>';
              });
            return;
          }
          
          // 重新加载并搜索
          fetch('./影视资源表格.html')
            .then(response => response.text())
            .then(html => {
              const parser = new DOMParser();
              const doc = parser.parseFromString(html, 'text/html');
              
              const tables = Array.from(doc.querySelectorAll('table')).filter(table => {
                const text = table.textContent || '';
                return text.includes('剧名') && (text.includes('夸克') || text.includes('百度'));
              });
              
              const filteredTables = tables.filter(table => {
                const title = table.previousElementSibling && table.previousElementSibling.tagName === 'H2' ? table.previousElementSibling.textContent : '影视资源表';
                const content = table.textContent;
                return title.toLowerCase().includes(searchTerm) || content.toLowerCase().includes(searchTerm);
              });
              
              if (filteredTables.length === 0) {
                mediaTables.innerHTML = '<div style="text-align: center; padding: 40px;">暂无相关影视资源</div>';
                return;
              }
              
              mediaTables.innerHTML = '';
              filteredTables.forEach(table => {
                const title = table.previousElementSibling && table.previousElementSibling.tagName === 'H2' ? table.previousElementSibling.textContent : '影视资源表';
                const wrapper = document.createElement('div');
                wrapper.className = 'media-table';
                const titleElement = document.createElement('h3');
                
                // 高亮标题中的搜索词
                titleElement.innerHTML = highlightText(title, searchTerm);
                wrapper.appendChild(titleElement);
                
                const cloned = table.cloneNode(true);
                
                // 高亮表格内容中的搜索词
                highlightTableContent(cloned, searchTerm);
                
                cloned.querySelectorAll('a').forEach(link => {
                  link.setAttribute('target', '_blank');
                  link.setAttribute('rel', 'noopener');
                });
                wrapper.appendChild(cloned);
                mediaTables.appendChild(wrapper);
              });
            })
            .catch(() => {
              mediaTables.innerHTML = '<div style="text-align: center; padding: 40px;">搜索失败，请稍后重试</div>';
            });
        }
        
        // 高亮文本中的搜索词
        function highlightText(text, searchTerm) {
          if (!searchTerm) return text;
          const regex = new RegExp(`(${searchTerm})`, 'gi');
          return text.replace(regex, '<span style="background-color: #ffeb3b; color: #000; padding: 0 2px; border-radius: 2px;">$1</span>');
        }
        
        // 高亮表格内容中的搜索词
        function highlightTableContent(table, searchTerm) {
          const cells = table.querySelectorAll('td, th');
          cells.forEach(cell => {
            if (cell.textContent) {
              cell.innerHTML = highlightText(cell.textContent, searchTerm);
            }
          });
        }
        </script>
        <div class="media-table" id="mediaTables">加载中...</div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2026 zz资源库 · 影视资源持续更新</p>
    </footer>

    <script src="./script.js"></script>
    <script>
      const mediaLinks = document.getElementById("mediaLinks");
      const mediaTables = document.getElementById("mediaTables");

      const normalizeLink = (url) => {
        if (!url) return "";
        return url.replace(/&amp;/g, "&");
      };

      const addLinkButton = (label, href) => {
        if (!href) return;
        const link = document.createElement("a");
        link.className = "btn ghost";
        link.textContent = label;
        link.href = href;
        link.target = "_blank";
        link.rel = "noopener";
        mediaLinks.appendChild(link);
      };

      const findHeadingForTable = (doc, table) => {
        const headings = Array.from(doc.querySelectorAll("h2"));
        let current = "影视资源表";
        for (const heading of headings) {
          if (heading.compareDocumentPosition(table) & Node.DOCUMENT_POSITION_FOLLOWING) {
            current = heading.textContent.trim();
          } else if (heading.compareDocumentPosition(table) & Node.DOCUMENT_POSITION_PRECEDING) {
            current = heading.textContent.trim();
            break;
          }
        }
        return current || "影视资源表";
      };

      // 全局变量
      window.originalTables = [];
      window.mediaTables = document.getElementById("mediaTables");

      fetch("./影视资源表格.html")
        .then((response) => response.text())
        .then((html) => {
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, "text/html");

          const serialLink = doc.querySelector('a[href*="feishu"][href*="shrcnc4l"]');
          const finishedLink = doc.querySelector('a[href*="feishu"][href*="shrcnfn"]');
          addLinkButton("连载中", normalizeLink(serialLink?.getAttribute("href")));
          addLinkButton("已完结", normalizeLink(finishedLink?.getAttribute("href")));

          const tables = Array.from(doc.querySelectorAll("table")).filter((table) => {
            const text = table.textContent || "";
            return text.includes("剧名") && (text.includes("夸克") || text.includes("百度"));
          });

          if (!tables.length) {
            mediaTables.textContent = "未找到影视表格，请确认影视资源.html已上传。";
            return;
          }

          // 保存原始表格数据
          window.originalTables = tables.map((table) => {
            const title = findHeadingForTable(doc, table);
            const cloned = table.cloneNode(true);
            cloned.querySelectorAll("a").forEach((link) => {
              link.setAttribute("target", "_blank");
              link.setAttribute("rel", "noopener");
            });
            return { title, table: cloned };
          });

          // 渲染所有表格
          window.renderTables(window.originalTables);

          // 添加搜索功能
          const searchButton = document.getElementById('searchButton');
          const searchInput = document.getElementById('searchInput');
          
          console.log('搜索按钮元素:', searchButton);
          console.log('搜索输入框元素:', searchInput);
          
          if (searchButton) {
            // 移除可能存在的旧事件监听器
            searchButton.onclick = null;
            // 添加新的点击事件监听器
            searchButton.addEventListener('click', function(e) {
              e.preventDefault();
              console.log('搜索按钮点击');
              performSearch();
            });
            console.log('搜索按钮点击事件已绑定');
          }
          
          if (searchInput) {
            searchInput.addEventListener('keypress', (e) => {
              if (e.key === 'Enter') {
                e.preventDefault();
                console.log('回车键搜索');
                performSearch();
              }
            });
            console.log('回车键搜索事件已绑定');
          }
          
          console.log('搜索功能初始化完成');
          console.log('原始表格数量:', originalTables.length);
        })
        .catch(() => {
          mediaTables.textContent = "读取失败，请确认影视资源.html与本页在同一目录。";
        });

      // 全局渲染函数
      window.renderTables = function(tablesData) {
        mediaTables.innerHTML = "";
        
        if (!tablesData.length) {
          const noResult = document.createElement("div");
          noResult.className = "media-table";
          noResult.style.textAlign = "center";
          noResult.style.padding = "40px";
          noResult.textContent = "暂无相关影视资源。";
          mediaTables.appendChild(noResult);
          return;
        }

        tablesData.forEach(({ title, table }) => {
          const wrapper = document.createElement("div");
          wrapper.className = "media-table";
          const titleElement = document.createElement("h3");
          titleElement.textContent = title;
          wrapper.appendChild(titleElement);
          wrapper.appendChild(table);
          mediaTables.appendChild(wrapper);
        });
      }

      // 全局搜索函数
      window.performSearch = function() {
        console.log('执行搜索');
        const searchInput = document.getElementById('searchInput');
        if (!searchInput) {
          console.error('搜索输入框未找到');
          return;
        }
        
        const searchTerm = searchInput.value.toLowerCase().trim();
        console.log('搜索词:', searchTerm);
        
        if (!searchTerm) {
          console.log('搜索词为空，显示所有结果');
          window.renderTables(window.originalTables);
          return;
        }

        // 过滤表格数据
        console.log('开始过滤表格，原始表格数量:', window.originalTables.length);
        
        // 对每个表格进行搜索
        const filteredTables = [];
        
        window.originalTables.forEach(({ title, table }) => {
          // 检查标题是否包含搜索词
          const titleMatch = title.toLowerCase().includes(searchTerm);
          // 检查表格内容是否包含搜索词
          const contentMatch = table.textContent.toLowerCase().includes(searchTerm);
          
          console.log('表格标题:', title, '标题匹配:', titleMatch, '内容匹配:', contentMatch);
          
          if (titleMatch || contentMatch) {
            filteredTables.push({ title, table });
          }
        });
        
        console.log('过滤后表格数量:', filteredTables.length);
        window.renderTables(filteredTables);
      }
    </script>
  </body>
</html>
